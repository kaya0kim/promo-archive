	$('.button__fora11y').on('click', function () {

		var promises = [];
		var _iteratorNormalCompletion = true;

				var param = _step.value;

			_didIteratorError = true;
			_iteratorError = err;
		} finally {

	function insertOCRText(target, ocrText) {
		var $target = $(target);

		if (!ocrText) ocrText = 'OCR 텍스트 인식이 어려운 이미지입니다'; //텍스트 미존재 or 애니메이션의 경우 or 에러케이스 포함

		if ($target.hasClass('banner__ocr')) {
			//상단배너
			$target.addClass('ocr__success').removeClass('banner__ocr').find('p.for-a11y').text(ocrText);
		} else if ($target.is('[class*="image__ocr"]')) {
			//스토리 이미지
			var isStoryType1 = $target.closest('.story_type1').length;
			var isKeywordType5 = $target.closest('.module_keyword4').length;

			//swiper 적용되는 경우 반복되는 캐러셀 clone에도 대체텍스트 적용해야함
			if (isStoryType1 || isKeywordType5) {

			$target.attr('alt', ocrText).addClass('ocr__success').removeClass(function (idx, className) {

	//OCR request Promise
	function getOCRPromise(target, imageUrl) {

			$.ajax({
				url: '/getOCRText',
				method: 'GET',
				cache: false,
				data: {
					imageUrl: imageUrl
				},
				success: function success(res) {
					if ((res.err_msg || '').includes('Failed to download image')) {
						reject(res);
					}

					var ocrText = (res.structured_text_list || []).join(' '); //Structured Text Array
					insertOCRText(target, ocrText); //대체텍스트 삽입
					resolve(res);
				}
			});
		});
	}

				return announceForAccessibility('error');

								{{else}}
									<span class="box">{{tourGoodsInfo.periodCountText}}</span>
								{{/ifCond}}
							{{else}}
								{{#if isSmileDelivery}}
									<!-- 스타배송 태그 -->
									<span class="box__arrival-tag">
									{{#ifCond SmileDeliveryInfo.ShippingType "==" "A7"}}
										{{#ifCond SmileDeliveryInfo.TransPolicyNo "==" 556948}}
											<span class="box__arrival-guarantee"><img src="{{arrivalGuaranteeImgUrl}}" alt="스타배송" class="image"></span>
										{{else ifCond SmileDeliveryInfo.TransPolicyNo "==" 556955}}
											<span class="box__arrival-guarantee"><img src="{{arrivalGuaranteeImgUrl}}" alt="스타배송" class="image"></span>
										{{else ifCond SmileDeliveryInfo.TransPolicyNo "==" 556956}}
											<span class="box__arrival-guarantee"><img src="{{arrivalGuaranteeImgUrl}}" alt="스타배송" class="image"></span>
										{{else}}
											{{#ifCond SmileDeliveryInfo.ShippingInfo "==" "TL"}}
												<span class="box__arrival-guarantee"><img src="{{arrivalGuaranteeImgUrl}}" alt="스타배송" class="image"></span>

												<span class="box__arrival-seller"><img src="{{arrivalSellerImgUrl}}" alt="판매자스타배송" class="image"></span>
											{{/ifCond}}
										{{/ifCond}}
									{{/ifCond}}
									{{#ifCond SmileDeliveryInfo.ShippingType "==" "A1"}}
										{{#ifCond SmileDeliveryInfo.ShippingInfo "==" "TL"}}
											<span class="box__arrival-guarantee"><img src="{{arrivalGuaranteeImgUrl}}" alt="스타배송" class="image"></span>

											<span class="box__arrival-seller"><img src="{{arrivalSellerImgUrl}}" alt="판매자스타배송" class="image"></span>

											{{/if}}
										{{else}}
											{{#if SmileDeliveryInfo.DisplayV2}} || {{SmileDeliveryInfo.DisplayV3}}

											{{/if}}
										{{/ifCond}}
									{{/if}}

								</span>
								{{/if}}

									{{else}}
										<span class="box">설치비 {{addComma installPrice}}원</span>
									{{/ifCond}}
								{{else if isRental}}
									<!--렌탈 -->
									{{#ifCond installPrice "==" 0}}
										<span class="box">기본 설치비 무료</span>
									{{else}}
										<span class="box">설치비 {{addComma installPrice}}원</span>
									{{/ifCond}}
									<span class="box">{{deliveryInfo}}</span>
								{{else}}
									{{#if exceptionCaseDeliveryFee}}

										<span class="box">{{deliveryInfo}}</span>
									{{else}}
										{{#if isSmileDelivery}}
											{{#ifCond SmileDeliveryInfo.ShippingInfo '==' "TL"}}

												{{else}}
													{{#ifCond deliveryFee '>' 0}}

													{{else}}
														<span class="box">무료배송</span>
													{{/ifCond}}
												{{/ifCond}}
											{{else}}
												<!-- 판매자스타배송 배송비 -->
												{{#if deliveryFeeDetail.isDeliveryFeeFree}}
													<span class="box">{{deliveryFeeDetail.deliveryFeeTxt}}</span>
												{{else}}
													<span class="box">배송비 {{addComma deliveryFee}}원</span>
												{{/if}}
											{{/ifCond}}
										{{else}}
											<!-- 일반상품 배송비 -->
											{{#if deliveryFeeDetail.isDeliveryFeeFree}}
												<span class="box">{{deliveryFeeDetail.deliveryFeeTxt}}</span>
											{{else}}
												<span class="box">배송비 {{addComma deliveryFee}}원</span>
											{{/if}}
										{{/if}}
									{{/if}}
								{{/if}}
							{{/if}}
						</div>
		
						{{{payCntHtml}}}
		
					{{/ifCond}}
		
					<button type="button" class="button btn_wish {{#if isFavorite}}active{{/if}}" title="{{goodsName}}" aria-pressed="{{#if isFavorite}}true{{else}}false{{/if}}" data-goods-no="{{goodsNo}}">
						<span class="for-a11y">관심</span>
					</button>
				</div>
			</div>
		</li>
