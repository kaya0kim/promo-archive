<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📦 프로모션 아카이브 - 전체 히스토리</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', 'Malgun Gothic', sans-serif;
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
    background: linear-gradient(135deg, #f5f7fa 0%, #e8eef5 100%);
    color: #333;
    min-height: 100vh;
  }
  h1 {
    color: #1F4E79;
    border-bottom: 3px solid #2E75B6;
    padding-bottom: 15px;
    font-size: 2em;
  }
  .subtitle {
    color: #666;
    margin-bottom: 30px;
    font-size: 1.05em;
  }
  .stats {
    background: white;
    padding: 25px;
    border-radius: 12px;
    margin-bottom: 30px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
  }
  .stat-item {
    flex: 1;
    min-width: 150px;
  }
  .stat-label {
    color: #666;
    font-size: 0.85em;
    margin-bottom: 5px;
  }
  .stat-value {
    color: #1F4E79;
    font-size: 1.8em;
    font-weight: bold;
  }
  .latest-badge {
    display: inline-block;
    background: #FF6B35;
    color: white;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.75em;
    margin-left: 10px;
    vertical-align: middle;
  }
  .week-card {
    background: white;
    padding: 20px 25px;
    margin: 15px 0;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    transition: all 0.2s;
    border-left: 5px solid #ddd;
  }
  .week-card:hover {
    transform: translateX(5px);
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }
  .week-card.latest {
    border-left-color: #FF6B35;
    background: linear-gradient(to right, #FFF9F4, white);
  }
  .week-card .date {
    font-size: 1.3em;
    font-weight: bold;
    color: #1F4E79;
    margin-bottom: 8px;
  }
  .week-card .info {
    color: #666;
    font-size: 0.95em;
    margin-bottom: 12px;
  }
  .week-card .sites {
    color: #888;
    font-size: 0.85em;
    margin-bottom: 12px;
  }
  .week-card a {
    display: inline-block;
    background: #2E75B6;
    color: white;
    padding: 8px 20px;
    border-radius: 6px;
    text-decoration: none;
    font-size: 0.9em;
    transition: background 0.2s;
  }
  .week-card a:hover {
    background: #1F4E79;
  }
  .section-title {
    color: #2E75B6;
    margin-top: 35px;
    margin-bottom: 15px;
    font-size: 1.3em;
    padding-left: 10px;
    border-left: 4px solid #2E75B6;
  }
  .empty {
    text-align: center;
    padding: 40px;
    color: #999;
  }
  footer {
    text-align: center;
    color: #999;
    font-size: 0.85em;
    margin-top: 40px;
    padding: 20px;
  }
</style>
</head>
<body>
  <h1>📦 프로모션 아카이브</h1>
  <div class="subtitle">경쟁사 프로모션 주간 모니터링 히스토리</div>

  <div class="stats">
    <div class="stat-item">
      <div class="stat-label">📅 총 주차</div>
      <div class="stat-value">1주</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">📦 총 프로모션</div>
      <div class="stat-value">5개</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">💾 총 용량</div>
      <div class="stat-value">9.3MB</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">🔄 마지막 업데이트</div>
      <div class="stat-value" style="font-size:1.2em;">2026-04-20</div>
    </div>
  </div>

  <div class="section-title">📅 최신 아카이브</div>
  <div class="week-card latest">
    <div class="date">
      🗓️ 2026-04-20 (월)
      <span class="latest-badge">NEW</span>
    </div>
    <div class="info">
      📊 5개 사이트 · 5개 프로모션 · 9.3MB
    </div>
    <div class="sites">
      사이트: 11st(1) · 29cm(1) · gmarket(1) · musinsa(1) · naver_shopping(1)
    </div>
    <a href="./2026-04-20/">상세 보기 →</a>
  </div>

  <footer>
    📦 프로모션 아카이브 시스템 · 매주 월요일 자동 업데이트<br>
    <small>Last updated: 2026-04-20</small>
  </footer>
</body>
</html>
